services:
  - type: web
    name: crediario-digital-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CREDIARIO_DB_BACKEND
        value: postgresql
      - key: CREDIARIO_DATABASE_URL
        sync: false
