{% extends 'base.html' %}{% block content %}<h1>Clientes</h1><section class="card"><h2>Novo cliente</h2><form method="post" class="form-grid"><input name="nome" placeholder="Nome" required><input name="documento" placeholder="CPF/CNPJ"><input name="telefone" placeholder="Telefone"><input name="endereco" placeholder="Endereço"><input name="bairro" placeholder="Bairro"><input name="cidade" placeholder="Cidade"><select name="rota"><option>Rota 1</option><option>Rota 2</option><option>Rota 3</option><option>Rota 4</option><option>Rota 5</option></select><button>Salvar</button></form></section><section class="card"><form><input name="q" value="{{q}}" placeholder="Pesquisar cliente, telefone ou rota"><button>Pesquisar</button></form><table><tr><th>Nome</th><th>Telefone</th><th>Rota</th><th></th></tr>{% for c in clientes %}<tr><td>{{c.nome}}</td><td>{{c.telefone}}</td><td>{{c.rota}}</td><td><a href="/clientes/{{c.id}}/excluir" onclick="return confirm('Excluir cliente?')">Excluir</a></td></tr>{% endfor %}</table></section>{% endblock %}
