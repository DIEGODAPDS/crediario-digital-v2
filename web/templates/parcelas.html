{% extends 'base.html' %}{% block content %}<h1>Parcelas</h1><section class="card"><form><select name="status"><option value="aberta" {% if status=='aberta' %}selected{% endif %}>Abertas</option><option value="paga" {% if status=='paga' %}selected{% endif %}>Pagas</option></select><input name="q" value="{{q}}" placeholder="Cliente ou rota"><button>Filtrar</button></form><table><tr><th>Cliente</th><th>Rota</th><th>Parcela</th><th>Valor</th><th>Vencimento</th><th>Status</th><th></th></tr>{% for p in parcelas %}<tr><td>{{p.nome}}</td><td>{{p.rota}}</td><td>{{p.numero}}</td><td>{{p.valor|money}}</td><td>{{p.vencimento}}</td><td>{{p.status}}</td><td>{% if p.status=='aberta' %}<a href="/parcelas/{{p.id}}/baixar">Baixar</a>{% else %}<a href="/parcelas/{{p.id}}/reverter">Reverter</a>{% endif %}</td></tr>{% endfor %}</table></section>{% endblock %}
