{% extends 'base.html' %}{% block content %}<h1>Nova venda</h1><section class="card"><form method="post" class="form-grid"><select name="cliente_id" required>{% for c in clientes %}<option value="{{c.id}}">{{c.nome}}</option>{% endfor %}</select><input name="descricao" placeholder="Descrição"><input name="valor_total" type="number" step="0.01" placeholder="Valor total" required><input name="parcelas" type="number" min="1" value="1" placeholder="Parcelas" required><input name="primeiro_vencimento" type="date" required><button>Gerar parcelas</button></form></section>{% endblock %}
